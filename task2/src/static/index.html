<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPU Profiler</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>CPU Profiler</h1>
      <p id="subtitle">Continuous perf sampling</p>
    </div>
    <div class="actions">
      <button id="refreshBtn" type="button" title="Refresh status">Refresh</button>
      <button id="startBtn" type="button" title="Start collector">Start</button>
      <button id="stopBtn" type="button" title="Stop collector">Stop</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel metrics">
      <div class="metric">
        <span>Collector</span>
        <strong id="collectorState">--</strong>
      </div>
      <div class="metric">
        <span>Samples</span>
        <strong id="sampleCount">--</strong>
      </div>
      <div class="metric">
        <span>Window</span>
        <strong id="windowSeconds">--</strong>
      </div>
      <div class="metric">
        <span>Data Size</span>
        <strong id="dataSize">--</strong>
      </div>
    </section>

    <section class="workbench">
      <aside class="panel side">
        <h2>Query</h2>
        <label>
          <span>Start</span>
          <input id="startTime" type="datetime-local" step="1">
        </label>
        <label>
          <span>End</span>
          <input id="endTime" type="datetime-local" step="1">
        </label>
        <button id="generateBtn" type="button">Generate FlameGraph</button>
        <div id="message" class="message"></div>

        <h2>Recent Windows</h2>
        <div id="timeline" class="timeline"></div>
      </aside>

      <section class="panel viewer">
        <div class="viewerHead">
          <h2>FlameGraph</h2>
          <a id="openSvg" href="#" target="_blank" rel="noreferrer">Open SVG</a>
        </div>
        <iframe id="svgFrame" title="Generated flame graph"></iframe>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
